name: Deploy

on:
  push:
    branches: [main, staging]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: alexappsco/classat-website

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment tag
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tag=production" >> $GITHUB_OUTPUT
          else
            echo "tag=staging" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.env.outputs.tag }}
            ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.env.outputs.tag }}-${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_HOST_API=${{ vars.NEXT_PUBLIC_HOST_API }}
            NEXT_PUBLIC_HOST_API_SHARED=${{ vars.NEXT_PUBLIC_HOST_API_SHARED }}
            NEXT_PUBLIC_GOOGLE_MAP_API_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_MAP_API_KEY }}
            NEXT_PUBLIC_GOOGLE_MAP_ID=${{ vars.NEXT_PUBLIC_GOOGLE_MAP_ID }}
          cache-from: type=gha,scope=${{ steps.env.outputs.tag }}
          cache-to: type=gha,mode=max,scope=${{ steps.env.outputs.tag }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Set deploy config
        id: config
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tag=production" >> $GITHUB_OUTPUT
            echo "container=classat-prod" >> $GITHUB_OUTPUT
            echo "port=4004" >> $GITHUB_OUTPUT
          else
            echo "tag=staging" >> $GITHUB_OUTPUT
            echo "container=classat" >> $GITHUB_OUTPUT
            echo "port=4003" >> $GITHUB_OUTPUT
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Login to GHCR
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull the new image
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.config.outputs.tag }}

            # Stop and remove old container (ignore errors if not running)
            docker stop ${{ steps.config.outputs.container }} 2>/dev/null || true
            docker rm ${{ steps.config.outputs.container }} 2>/dev/null || true

            # Run new container
            docker run -d \
              --name ${{ steps.config.outputs.container }} \
              --restart unless-stopped \
              -p 127.0.0.1:${{ steps.config.outputs.port }}:8083 \
              ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.config.outputs.tag }}

            # Wait for healthcheck
            echo "Waiting for container to be healthy..."
            for i in $(seq 1 30); do
              if curl -sf http://127.0.0.1:${{ steps.config.outputs.port }} > /dev/null 2>&1; then
                echo "Container is healthy!"
                break
              fi
              if [ $i -eq 30 ]; then
                echo "ERROR: Container failed to start. Rolling back..."
                docker stop ${{ steps.config.outputs.container }} 2>/dev/null || true
                docker rm ${{ steps.config.outputs.container }} 2>/dev/null || true
                exit 1
              fi
              sleep 2
            done

            # Clean up old images
            docker image prune -f 2>/dev/null || true

            echo "Deployment complete! (${{ steps.config.outputs.tag }} on port ${{ steps.config.outputs.port }})"