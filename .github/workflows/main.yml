name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch: # allows manual trigger from GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_HOST_API=${{ vars.NEXT_PUBLIC_HOST_API }}
            NEXT_PUBLIC_HOST_API_SHARED=${{ vars.NEXT_PUBLIC_HOST_API_SHARED }}
            NEXT_PUBLIC_GOOGLE_MAP_API_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_MAP_API_KEY }}
            NEXT_PUBLIC_GOOGLE_MAP_ID=${{ vars.NEXT_PUBLIC_GOOGLE_MAP_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Login to GHCR
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull the new image
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest

            # Stop and remove old container (ignore errors if not running)
            docker stop classat 2>/dev/null || true
            docker rm classat 2>/dev/null || true

            # Run new container
            docker run -d \
              --name classat \
              --restart unless-stopped \
              -p 127.0.0.1:4003:8083 \
              ghcr.io/${{ env.IMAGE_NAME }}:latest

            # Wait for healthcheck
            echo "Waiting for container to be healthy..."
            for i in $(seq 1 30); do
              if curl -sf http://127.0.0.1:4003 > /dev/null 2>&1; then
                echo "Container is healthy!"
                break
              fi
              if [ $i -eq 30 ]; then
                echo "ERROR: Container failed to start. Rolling back..."
                docker stop classat 2>/dev/null || true
                docker rm classat 2>/dev/null || true
                # Try to run previous image
                PREV_IMAGE=$(docker images ghcr.io/${{ env.IMAGE_NAME }} --format '{{.Tag}}' | grep -v latest | head -1)
                if [ -n "$PREV_IMAGE" ]; then
                  docker run -d --name classat --restart unless-stopped -p 127.0.0.1:4003:8083 ghcr.io/${{ env.IMAGE_NAME }}:$PREV_IMAGE
                  echo "Rolled back to $PREV_IMAGE"
                fi
                exit 1
              fi
              sleep 2
            done

            # Clean up old images (keep last 3)
            docker images ghcr.io/${{ env.IMAGE_NAME }} --format '{{.ID}} {{.CreatedAt}}' | \
              sort -k2 -r | awk 'NR>3 {print $1}' | xargs -r docker rmi 2>/dev/null || true

            echo "Deployment complete!"
